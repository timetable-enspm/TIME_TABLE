{% extends "base.html" %}
{% block titre %}Supprimer Salle — EDT ENSPM{% endblock %}
{% block contenu %}
<div class="page-header">
  <div class="page-header-left">
    <div class="page-icon"><i class="ti ti-alert-triangle"></i></div>
    <div>
      <h1 class="page-title">Supprimer une salle</h1>
      <p class="page-sub">Cette action est définitive.</p>
    </div>
  </div>
</div>
<div class="card" style="padding:24px;">
  <p>
    Voulez-vous vraiment supprimer la salle
    <strong>{{ salle.nom }}</strong>
    (site : <strong>{{ salle.site }}</strong>) ?
  </p>
  <form method="post" class="form-actions">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger-soft"><i class="ti ti-trash"></i> Supprimer</button>
    <a href="{% url 'salle_liste' %}" class="btn btn-secondary">Annuler</a>
  </form>
</div>
{% endblock %}
